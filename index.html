<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de controle de ponto</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="data-hora">
        <p id="dia-semana">Segunda-feira</p>
        <p id="dia-mes-ano">29/08/2024</p>
        <p id="hora-min-seg">09:15:10</p>
    </div>
    <dialog open>
        <p>Data</p>
        <p>Hora</p>
        <button>Fechar</button>
        <button>Entrada</button>
        <button>Intervalo</button>
        <button>Volta intervalo</button>
        <button>Saída</button>
    </dialog>
    <button>Registrar ponto</button>



    <script src="js/index.js"></script>
</body>
</html>
